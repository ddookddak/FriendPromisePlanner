version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: friendplanner
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: friendplanner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U friendplanner"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
